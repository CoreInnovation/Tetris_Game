name = "chriskit-arcade"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# Per-room real-time state lives in a Durable Object.
[[durable_objects.bindings]]
name = "PONG_ROOM"
class_name = "PongRoom"

# New SQLite-backed Durable Objects (available on the Workers FREE plan).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PongRoom"]

# Shared leaderboards database (D1). Create it once, then paste the printed database_id below:
#   wrangler d1 create chriskit-arcade
#   wrangler d1 execute chriskit-arcade --remote --file=./schema.sql
[[d1_databases]]
binding = "DB"
database_name = "chriskit-arcade"
database_id = "PUT-YOUR-D1-DATABASE-ID-HERE"
