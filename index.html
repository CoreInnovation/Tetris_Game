<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a12" />
  <title>Arcade — Tetris</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%235ad1ff'/><rect x='20' y='20' width='25' height='25' fill='%23111'/><rect x='55' y='20' width='25' height='25' fill='%23111'/><rect x='20' y='55' width='25' height='25' fill='%23111'/></svg>" />
</head>
<body>
  <div id="app">
    <!-- ===================== TOP BAR ===================== -->
    <header id="topbar">
      <button id="backBtn" class="icon-btn hidden" title="Back to menu" aria-label="Back to menu">‹</button>
      <h1 id="title">A&nbsp;R&nbsp;C&nbsp;A&nbsp;D&nbsp;E</h1>
      <div id="topbar-right">
        <button id="devBtn" class="icon-btn hidden" title="Dev mode — unlock & test any weapon" aria-label="Dev mode">🛠️</button>
        <button id="musicBtn" class="icon-btn hidden" title="Switch music (N)" aria-label="Switch music">🎵</button>
        <button id="themeBtn" class="icon-btn hidden" title="Switch skin (T)" aria-label="Switch skin">🎨</button>
        <button id="soundBtn" class="icon-btn" title="Toggle sound (M)" aria-label="Toggle sound">🔊</button>
      </div>
    </header>

    <!-- ===================== MAIN MENU ===================== -->
    <main id="menu" class="screen">
      <div class="menu-inner">
        <p class="menu-kicker">SELECT A GAME</p>
        <div id="gameGrid" class="game-grid"></div>
        <p class="menu-hint">More modules coming soon — this shell is built to grow.</p>
      </div>
    </main>

    <!-- ===================== GAME VIEW ===================== -->
    <main id="gameView" class="screen hidden">
      <canvas id="gameCanvas"></canvas>

      <!-- On-screen touch controls (auto-shown on touch devices) -->
      <div id="touchControls" class="touch-controls hidden" aria-hidden="true">
        <div class="touch-row">
          <button class="tc-btn" data-act="hold">HOLD</button>
          <button class="tc-btn" data-act="ccw">⟲</button>
          <button class="tc-btn" data-act="cw">⟳</button>
        </div>
        <div class="touch-row">
          <button class="tc-btn" data-act="left">◀</button>
          <button class="tc-btn" data-act="soft">▼</button>
          <button class="tc-btn" data-act="right">▶</button>
          <button class="tc-btn wide" data-act="hard">DROP</button>
        </div>
      </div>

      <!-- Pause overlay -->
      <div id="pauseOverlay" class="overlay hidden">
        <div class="panel">
          <h2>Paused</h2>
          <button class="btn primary" data-action="resume">Resume</button>
          <button class="btn" data-action="restart">Restart</button>
          <button class="btn" data-action="theme">Switch Skin</button>
          <button class="btn ghost" data-action="quit">Quit to Menu</button>
        </div>
      </div>

      <!-- Game over overlay -->
      <div id="gameoverOverlay" class="overlay hidden">
        <div class="panel">
          <h2 class="danger">Game Over</h2>
          <div class="result-stats">
            <div><span class="rs-label">Score</span><span id="goScore" class="rs-value">0</span></div>
            <div><span class="rs-label">Best</span><span id="goBest" class="rs-value">0</span></div>
            <div id="goNew" class="new-best hidden">★ NEW BEST ★</div>
          </div>
          <button class="btn primary" data-action="restart">Play Again</button>
          <button class="btn ghost" data-action="quit">Quit to Menu</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ===================== SCRIPTS (classic, load-order matters) ===================== -->
  <!-- Core engine -->
  <script src="js/core/eventbus.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/input.js"></script>
  <script src="js/core/loop.js"></script>
  <script src="js/core/particles.js"></script>
  <script src="js/core/audio.js"></script>
  <script src="js/core/gameshell.js"></script>

  <!-- Game module: Tetris -->
  <script src="js/games/tetris/pieces.js"></script>
  <script src="js/games/tetris/themes.js"></script>
  <script src="js/games/tetris/renderer.js"></script>
  <script src="js/games/tetris/tetris.js"></script>
  <script src="js/games/tetris/index.js"></script>

  <!-- Game module: Dr. Quackers (Dr. Mario clone) -->
  <script src="js/games/drmario/drthemes.js"></script>
  <script src="js/games/drmario/drrenderer.js"></script>
  <script src="js/games/drmario/drmario.js"></script>
  <script src="js/games/drmario/index.js"></script>

  <!-- Game module: Asteroids -->
  <script src="js/games/asteroids/astthemes.js"></script>
  <script src="js/games/asteroids/astrenderer.js"></script>
  <script src="js/games/asteroids/asteroids.js"></script>
  <script src="js/games/asteroids/index.js"></script>

  <!-- Game module: Missile Defense -->
  <script src="js/games/missile/mdthemes.js"></script>
  <script src="js/games/missile/mdrenderer.js"></script>
  <script src="js/games/missile/missiledefense.js"></script>
  <script src="js/games/missile/index.js"></script>

  <!-- Game module: Space Pinball -->
  <script src="js/games/pinball/pinthemes.js"></script>
  <script src="js/games/pinball/pinrenderer.js"></script>
  <script src="js/games/pinball/pinball.js"></script>
  <script src="js/games/pinball/index.js"></script>

  <!-- Boot -->
  <script src="js/main.js"></script>
</body>
</html>
